<div class="question-card">
      <h2>Q28 - Password Length Validation</h2>
      <form [formGroup]="form">
        <input type="password" formControlName="password" placeholder="Password" />
        <p class="error" *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
          Password must be at least 6 characters.
        </p>
      </form>
    </div>
