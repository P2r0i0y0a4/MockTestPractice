<div class="question-card">
      <h2>Q35 - Errors Only After Interaction</h2>
      <form [formGroup]="form">
        <input formControlName="name" placeholder="Name" />
        <p class="error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">Name is required.</p>
      </form>
    </div>
